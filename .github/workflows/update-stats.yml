name: Update Beyond Howser Stats

on:
  schedule:
    - cron: '0 9 * * *'  # Runs daily at 9:00 UTC = 5:00 AM Eastern
  workflow_dispatch:        # Also allows manual "Run now" from GitHub

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl requests tweepy

      - name: Run stats updater
        run: python noles_stats_updater.py

      - name: Inject last-updated indicator
        run: |
          python3 - <<'PYEOF'
          from datetime import datetime, timezone
          ts = datetime.now(timezone.utc).strftime('%B %d, %Y at %I:%M %p')
          with open('noles_dashboard.html', 'r', encoding='utf-8') as f:
            html = f.read()
          if 'class="hero-updated"' not in html:
            css = '.hero-updated{margin-top:16px;padding-top:14px;border-top:1px solid rgba(206,184,136,.2);color:rgba(255,255,255,.65);font-size:.8rem;letter-spacing:.03em}.hero-updated strong{color:var(--gold);font-weight:600}\n'
            html = html.replace('</style>', css + '</style>', 1)
            tag = ' <div class="hero-updated">Stats last updated: <strong>' + ts + ' UTC</strong></div>\n </div>\n</section>'
            html = html.replace(' </div>\n</section>', tag, 1)
            with open('noles_dashboard.html', 'w', encoding='utf-8') as f:
              f.write(html)
            print('Injected: ' + ts)
          else:
            print('Already present, skipping')
          PYEOF

      - name: Sync index.html with dashboard
        run: cp noles_dashboard.html index.html

      - name: Commit updated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add noles_in_the_pros.xlsx noles_dashboard.html index.html player_id_cache.json news_cache.json yesterday_data.js
          git diff --staged --quiet || git commit -m "Auto-update stats $(date +'%Y-%m-%d')"
          git push

      - name: Run social post drafter
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python social_post_drafter.py

      - name: Set today date
        run: echo "TODAY=$(date +'%B %d, %Y')" >> $GITHUB_ENV

      - name: Email daily post drafts
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASS }}
          subject: "Beyond Howser - Daily Post Drafts (${{ env.TODAY }})"
          to: nolesintheshow@gmail.com
          from: Beyond Howser <${{ secrets.GMAIL_ADDRESS }}>
          html_body: file://email_body.html
          continue-on-error: true

      - name: Commit social drafts log
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add social_drafts.json || true
          git diff --staged --quiet || git commit -m "Update social drafts $(date +'%Y-%m-%d')"
          git push

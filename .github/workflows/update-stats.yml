name: Update Noles Stats

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl requests

      - name: Run stats updater
        run: python noles_stats_updater.py

      - name: Inject last-updated indicator
        run: |
          python3 - <<'PYEOF'
          from datetime import datetime, timezone
          ts = datetime.now(timezone.utc).strftime('%B %d, %Y at %I:%M %p')
          with open('noles_dashboard.html', 'r') as f:
              html = f.read()
          if 'class="hero-updated"' not in html:
              css = '.hero-updated{margin-top:16px;padding-top:14px;border-top:1px solid rgba(206,184,136,.2);color:rgba(255,255,255,.65);font-size:.8rem;letter-spacing:.03em}.hero-updated strong{color:var(--gold);font-weight:600}\n'
              html = html.replace('</style>', css + '</style>', 1)
              tag = '    <div class="hero-updated">Stats last updated: <strong>' + ts + ' UTC</strong></div>\n  </div>\n</section>'
              html = html.replace('  </div>\n</section>', tag, 1)
              with open('noles_dashboard.html', 'w') as f:
                  f.write(html)
              print('Injected: ' + ts)
          else:
              print('Already present, skipping')
          PYEOF

      - name: Commit updated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add noles_in_the_pros.xlsx noles_dashboard.html player_id_cache.json
          git diff --staged --quiet || git commit -m "Auto-update stats $(date +'%Y-%m-%d')"
          git push
